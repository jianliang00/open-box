<style>
  :root {
    --bg:        #f6f5f1;
    --bg-2:      #efede6;
    --surface:   #ffffff;
    --ink:       #15140f;
    --ink-2:     #2a2824;
    --ink-3:     #5a564d;
    --ink-4:     #8a857a;
    --line:      #e2dfd5;
    --line-2:    #d1cdc0;
    --accent:    oklch(0.62 0.16 240);
    --accent-ink:#ffffff;
    --accent-bg: oklch(0.95 0.03 240);
    --good:      oklch(0.60 0.14 150);
    --good-bg:   oklch(0.95 0.04 150);
    --warn:      oklch(0.65 0.15 60);

    --font-body:  'Supreme', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono:  'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --font-serif: 'Gambarino', 'Fraunces', 'Times New Roman', serif;
  }

  html, body { background: var(--bg); color: var(--ink); }
  body {
    margin: 0;
    font-family: var(--font-body);
    font-feature-settings: "ss01","ss02","cv11";
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  ::selection { background: var(--accent); color: #fff; }

  /* grid overlay — very subtle paper feel */
  body::before {
    content:"";
    position: fixed; inset: 0;
    background:
      linear-gradient(var(--line) 1px, transparent 1px) 0 0 / 100% 48px,
      radial-gradient(circle at 50% 0%, rgba(0,0,0,0.02), transparent 60%);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: multiply;
  }

  #root { position: relative; z-index: 1; }
</style>
