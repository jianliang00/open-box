<script>
  (() => {
    try {
      const storedTheme = localStorage.getItem("openbox-theme");
      const theme = storedTheme || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      const storedLang = localStorage.getItem("openbox-lang");
      const lang = storedLang || (navigator.language.toLowerCase().startsWith("zh") ? "zh" : "en");
      document.documentElement.dataset.theme = theme;
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      window.__OPENBOX_LANG__ = lang;
    } catch (_) {
      document.documentElement.dataset.theme = "light";
      window.__OPENBOX_LANG__ = "en";
    }
  })();
</script>

<style>
